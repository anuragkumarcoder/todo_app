<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Custom style for completed tasks */
        .text-strike-through {
            text-decoration: line-through;
            color: #6c757d; /* Muted gray color */
        }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="text-center">
        <h1 class="mb-4">Todo Application</h1>
    </div>

    <div class="row justify-content-center mb-5">
        <div class="col-md-10">
            <form th:action="@{/tasks}" method="post" class="row g-2">
                <div class="col-md-10">
                    <input type="text" name="title" class="form-control form-control-lg" placeholder="Add a new task..." required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary btn-lg w-100">Add</button>
                </div>
            </form>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-10">
            <th:block th:each="task : ${tasks}">
                <div class="card mb-3 shadow-sm">
                    <div class="card-body d-flex justify-content-between align-items-center">

                        <span th:text="${task.title}"
                              th:classappend="${task.complete} ? 'text-strike-through' : ''"
                              class="fs-5 fw-bold">
                            Task Title Placeholder
                        </span>

                        <div class="btn-group">
                            <a th:href="@{/{id}/toggle(id=${task.id})}"
                               class="btn btn-outline-secondary btn-sm">Toggle</a>

                            <a th:href="@{/{id}/delete(id=${task.id})}"
                               class="btn btn-outline-danger btn-sm ms-2">Delete</a>
                        </div>
                    </div>
                </div>
            </th:block>
        </div>
    </div>
</div>

</body>
</html>
